<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amlhere</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --surface: #141416;
            --border: rgba(255,255,255,0.06);
            --text: #e8e6e0;
            --muted: #6b6860;
            --accent: #c4a882;
            --accent-dim: rgba(196,168,130,0.12);
            --user-bg: rgba(196,168,130,0.08);
            --ai-bg: rgba(255,255,255,0.03);
            --glow: rgba(196,168,130,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 背景のノイズテクスチャ */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ヘッダー */
        header {
            position: relative;
            z-index: 10;
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(13,13,15,0.8);
            backdrop-filter: blur(20px);
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: var(--accent);
        }

        .logo span {
            font-style: italic;
            opacity: 0.6;
            font-size: 0.9rem;
            margin-left: 10px;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.05em;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .dashboard-btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            text-decoration: none;
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .dashboard-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--muted);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4caf7d;
            box-shadow: 0 0 8px #4caf7d;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* チャットエリア */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            position: relative;
            z-index: 1;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ウェルカムメッセージ */
        .welcome {
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn 1s ease;
        }

        .welcome-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-weight: 300;
            color: var(--accent);
            margin-bottom: 12px;
            letter-spacing: 0.05em;
        }

        .welcome-sub {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.8;
            max-width: 400px;
            margin: 0 auto 32px;
            letter-spacing: 0.02em;
        }

        .welcome-hint {
            font-size: 0.8rem;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 20px;
            display: inline-block;
            cursor: pointer;
            transition: all 0.2s;
        }

        .welcome-hint:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* メッセージ */
        .message {
            display: flex;
            gap: 14px;
            margin-bottom: 24px;
            animation: slideIn 0.3s ease;
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .avatar.ai {
            background: var(--accent-dim);
            border: 1px solid rgba(196,168,130,0.2);
            color: var(--accent);
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.9rem;
        }

        .avatar.user {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--muted);
        }

        .bubble {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.7;
            max-width: calc(100% - 50px);
        }

        .message.ai .bubble {
            background: var(--ai-bg);
            border: 1px solid var(--border);
            border-radius: 4px 16px 16px 16px;
            color: var(--text);
        }

        .message.user .bubble {
            background: var(--user-bg);
            border: 1px solid rgba(196,168,130,0.15);
            border-radius: 16px 4px 16px 16px;
            color: var(--text);
        }

        /* 内面の表示 */
        .inner-state {
            max-width: 720px;
            margin: -16px auto 24px;
            padding-left: 46px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        .tag.thought { border-color: rgba(196,168,130,0.2); color: rgba(196,168,130,0.6); }
        .tag.emotion { border-color: rgba(130,180,196,0.2); color: rgba(130,180,196,0.6); }
        .tag.action  { border-color: rgba(180,196,130,0.2); color: rgba(180,196,130,0.6); }

        /* タイピングインジケーター */
        .typing {
            display: flex;
            gap: 14px;
            margin-bottom: 24px;
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 14px 18px;
            background: var(--ai-bg);
            border: 1px solid var(--border);
            border-radius: 4px 16px 16px 16px;
        }

        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--muted);
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* 入力エリア */
        .input-area {
            position: relative;
            z-index: 10;
            padding: 20px 32px;
            border-top: 1px solid var(--border);
            background: rgba(13,13,15,0.9);
            backdrop-filter: blur(20px);
        }

        .input-wrapper {
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 300;
            resize: none;
            outline: none;
            line-height: 1.6;
            max-height: 120px;
            min-height: 50px;
            transition: border-color 0.2s;
        }

        textarea::placeholder { color: var(--muted); }
        textarea:focus { border-color: rgba(196,168,130,0.3); }

        .send-btn {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover { background: #d4b894; transform: scale(1.05); }
        .send-btn:active { transform: scale(0.97); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .send-btn svg { width: 18px; height: 18px; fill: #0d0d0f; }

        /* ユーザーID入力 */
        .user-id-bar {
            max-width: 720px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-id-bar label {
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        .user-id-bar input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 2px 6px;
            color: var(--muted);
            font-size: 0.72rem;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            width: 120px;
            transition: border-color 0.2s;
        }

        .user-id-bar input:focus {
            border-color: rgba(196,168,130,0.4);
            color: var(--accent);
        }

        .error-msg {
            max-width: 720px;
            margin: 8px auto 0;
            font-size: 0.75rem;
            color: #e07070;
            text-align: center;
            min-height: 16px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        Amlhere
        <span>アムリエ</span>
    </div>
    <div class="header-right">
        <a href="http://localhost:8001/dashboard/user_001" class="dashboard-btn" target="_blank">ダッシュボード</a>
        <div class="status">
            <div class="status-dot"></div>
            オンライン
        </div>
    </div>
</header>

<div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
        <div class="welcome-title">Amlhere</div>
        <p class="welcome-sub">
            心は灰色でも、私はいつでもここにいる。<br>
            思考・感情・行動を記録しながら、あなたと共に成長します。
        </p>
        <div class="welcome-hint" onclick="sendWelcome()">最近の気分を教えてください →</div>
    </div>
</div>

<div class="input-area">
    <div class="user-id-bar">
        <label>USER ID</label>
        <input type="text" id="userId" value="user_001" />
    </div>
    <div class="input-wrapper">
        <textarea
            id="messageInput"
            placeholder="今の気持ちを話してください..."
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
</div>

<script>
    const API_URL = 'http://localhost:8000';
    let isLoading = false;

    // テキストエリアの自動リサイズ
    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // Enterキーで送信（Shift+Enterは改行）
    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    // ウェルカムヒントクリック
    function sendWelcome() {
        document.getElementById('messageInput').value = '最近の気分を教えてください';
        sendMessage();
    }

    // メッセージ送信
    async function sendMessage() {
        if (isLoading) return;

        const input = document.getElementById('messageInput');
        const userId = document.getElementById('userId').value.trim();
        const message = input.value.trim();
        const errorMsg = document.getElementById('errorMsg');

        // バリデーション
        errorMsg.textContent = '';
        if (!message) {
            errorMsg.textContent = 'メッセージを入力してください';
            return;
        }
        if (!userId) {
            errorMsg.textContent = 'ユーザーIDを入力してください';
            return;
        }

        // ウェルカム画面を隠す
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.style.display = 'none';

        // ユーザーメッセージを表示
        addMessage('user', message);
        input.value = '';
        input.style.height = 'auto';

        // タイピングインジケーター表示
        const typingId = showTyping();
        isLoading = true;
        document.getElementById('sendBtn').disabled = true;

        try {
            const res = await fetch(`${API_URL}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: userId, message })
            });

            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || 'エラーが発生しました');
            }

            const data = await res.json();
            removeTyping(typingId);
            addMessage('ai', data.reply, data.thought, data.emotion, data.action);

        } catch (e) {
            removeTyping(typingId);
            errorMsg.textContent = e.message.includes('Failed to fetch')
                ? 'サーバーに接続できません。起動しているか確認してください。'
                : e.message;
        } finally {
            isLoading = false;
            document.getElementById('sendBtn').disabled = false;
        }
    }

    // メッセージをDOMに追加
    function addMessage(role, text, thought = '', emotion = '', action = '') {
        const chatArea = document.getElementById('chatArea');

        const msg = document.createElement('div');
        msg.className = `message ${role}`;

        const avatarText = role === 'ai' ? 'A' : '你';
        msg.innerHTML = `
            <div class="avatar ${role}">${avatarText}</div>
            <div class="bubble">${escapeHtml(text)}</div>
        `;
        chatArea.appendChild(msg);

        // 内面状態タグ（AIのみ）
        if (role === 'ai' && (thought || emotion || action)) {
            const tags = document.createElement('div');
            tags.className = 'inner-state';
            if (thought) tags.innerHTML += `<span class="tag thought">💭 ${escapeHtml(thought)}</span>`;
            if (emotion) tags.innerHTML += `<span class="tag emotion">✦ ${escapeHtml(emotion)}</span>`;
            if (action)  tags.innerHTML += `<span class="tag action">→ ${escapeHtml(action)}</span>`;
            chatArea.appendChild(tags);
        }

        scrollToBottom();
    }

    // タイピングインジケーター
    function showTyping() {
        const chatArea = document.getElementById('chatArea');
        const id = 'typing-' + Date.now();
        const el = document.createElement('div');
        el.className = 'typing';
        el.id = id;
        el.innerHTML = `
            <div class="avatar ai">A</div>
            <div class="typing-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        `;
        chatArea.appendChild(el);
        scrollToBottom();
        return id;
    }

    function removeTyping(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    function scrollToBottom() {
        const chatArea = document.getElementById('chatArea');
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\n/g, '<br>');
    }
</script>
</body>
</html>
