<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amlhere</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --surface: #141416;
            --border: rgba(255,255,255,0.06);
            --text: #e8e6e0;
            --muted: #6b6860;
            --accent: #c4a882;
            --accent-dim: rgba(196,168,130,0.12);
            --user-bg: rgba(196,168,130,0.08);
            --ai-bg: rgba(255,255,255,0.03);
            --glow: rgba(196,168,130,0.15);
            --danger: #e07070;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 背景のノイズテクスチャ */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ヘッダー */
        header {
            position: relative;
            z-index: 10;
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(13,13,15,0.8);
            backdrop-filter: blur(20px);
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: var(--accent);
        }

        .logo span {
            font-style: italic;
            opacity: 0.6;
            font-size: 0.9rem;
            margin-left: 10px;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.05em;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .dashboard-btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            text-decoration: none;
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .dashboard-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: var(--muted);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4caf7d;
            box-shadow: 0 0 8px #4caf7d;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* チャットエリア */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            position: relative;
            z-index: 1;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ウェルカムメッセージ */
        .welcome {
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn 1s ease;
        }

        .welcome-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-weight: 300;
            color: var(--accent);
            margin-bottom: 12px;
            letter-spacing: 0.05em;
        }

        .welcome-sub {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.8;
            max-width: 400px;
            margin: 0 auto 32px;
            letter-spacing: 0.02em;
        }

        .welcome-hint {
            font-size: 0.8rem;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 20px;
            display: inline-block;
            cursor: pointer;
            transition: all 0.2s;
            background: none;
            font-family: 'DM Sans', sans-serif;
        }

        .welcome-hint:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* メッセージ */
        .message {
            display: flex;
            gap: 14px;
            margin-bottom: 24px;
            animation: slideIn 0.3s ease;
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .avatar.ai {
            background: var(--accent-dim);
            border: 1px solid rgba(196,168,130,0.2);
            color: var(--accent);
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.9rem;
        }

        .avatar.user {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--muted);
        }

        .bubble {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.7;
            max-width: calc(100% - 50px);
            word-break: break-word;
        }

        .message.ai .bubble {
            background: var(--ai-bg);
            border: 1px solid var(--border);
            border-radius: 4px 16px 16px 16px;
            color: var(--text);
        }

        .message.user .bubble {
            background: var(--user-bg);
            border: 1px solid rgba(196,168,130,0.15);
            border-radius: 16px 4px 16px 16px;
            color: var(--text);
        }

        /* 内面の表示 */
        .inner-state {
            max-width: 720px;
            margin: -16px auto 24px;
            padding-left: 46px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        .tag.thought { border-color: rgba(196,168,130,0.2); color: rgba(196,168,130,0.6); }
        .tag.emotion { border-color: rgba(130,180,196,0.2); color: rgba(130,180,196,0.6); }
        .tag.action  { border-color: rgba(180,196,130,0.2); color: rgba(180,196,130,0.6); }

        /* タイピングインジケーター */
        .typing {
            display: flex;
            gap: 14px;
            margin-bottom: 24px;
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 14px 18px;
            background: var(--ai-bg);
            border: 1px solid var(--border);
            border-radius: 4px 16px 16px 16px;
        }

        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--muted);
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* 入力エリア */
        .input-area {
            position: relative;
            z-index: 10;
            padding: 20px 32px;
            border-top: 1px solid var(--border);
            background: rgba(13,13,15,0.9);
            backdrop-filter: blur(20px);
        }

        .input-wrapper {
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 300;
            resize: none;
            outline: none;
            overflow: hidden;
            line-height: 1.6;
            min-height: 50px;
            transition: border-color 0.2s;
        }

        textarea::placeholder { color: var(--muted); }
        textarea:focus { border-color: rgba(196,168,130,0.3); }

        .send-btn {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover { background: #d4b894; transform: scale(1.05); }
        .send-btn:active { transform: scale(0.97); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .send-btn svg { width: 18px; height: 18px; fill: #0d0d0f; }

        /* ユーザーID入力 */
        .user-id-bar {
            max-width: 720px;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-id-bar label {
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        .user-id-bar input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 2px 6px;
            color: var(--muted);
            font-size: 0.72rem;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            width: 120px;
            transition: border-color 0.2s;
        }

        .user-id-bar input:focus {
            border-color: rgba(196,168,130,0.4);
            color: var(--accent);
        }

        .error-msg {
            max-width: 720px;
            margin: 8px auto 0;
            font-size: 0.75rem;
            color: var(--danger);
            text-align: center;
            min-height: 16px;
        }

        /* レスポンシブ */
        @media (max-width: 600px) {
            header { padding: 14px 16px; }
            .chat-area { padding: 16px; }
            .input-area { padding: 14px 16px; }
            .welcome-title { font-size: 2.2rem; }
            .logo { font-size: 1.3rem; }
            .logo span { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        Amlhere
        <span>アムリエ</span>
    </div>
    <div class="header-right">
        <a id="dashboardLink" href="#" class="dashboard-btn" target="_blank" rel="noopener noreferrer">ダッシュボード</a>
        <div class="status">
            <div class="status-dot"></div>
            <span>オンライン</span>
        </div>
    </div>
</header>

<div class="chat-area" id="chatArea" role="log" aria-label="チャット履歴">
    <div class="welcome" id="welcome">
        <div class="welcome-title">Amlhere</div>
        <p class="welcome-sub">
            心は灰色でも、私はいつでもここにいる。<br>
            思考・感情・行動を記録しながら、あなたと共に成長します。
        </p>
        <button class="welcome-hint" id="welcomeHint" type="button">最近の気分を教えてください →</button>
    </div>
</div>

<div class="input-area">
    <div class="user-id-bar">
        <label for="userId">USER ID</label>
        <input type="text" id="userId" value="user_001" maxlength="64" pattern="[a-zA-Z0-9_-]+" autocomplete="off" />
    </div>
    <div class="input-wrapper">
        <textarea
            id="messageInput"
            placeholder="今の気持ちを話してください..."
            rows="1"
            maxlength="2000"
            aria-label="メッセージ入力"
        ></textarea>
        <button class="send-btn" id="sendBtn" type="button" aria-label="送信">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
    <div class="error-msg" id="errorMsg" role="alert" aria-live="assertive"></div>
</div>

<script>
    (() => {
        'use strict';

        // ---- 設定 ----
        // Render production URL
        const API_URL = 'https://amlhere.onrender.com';
        const USER_ID_RE = /^[a-zA-Z0-9_-]{1,64}$/;

        // ---- DOM 参照 ----
        const chatArea     = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const userIdInput  = document.getElementById('userId');
        const sendBtn      = document.getElementById('sendBtn');
        const errorMsg     = document.getElementById('errorMsg');
        const welcome      = document.getElementById('welcome');
        const dashboardLink = document.getElementById('dashboardLink');
        const welcomeHint  = document.getElementById('welcomeHint');

        let isLoading = false;

        // ---- ダッシュボードリンク更新 ----
        function updateDashboardLink() {
            const uid = userIdInput.value.trim();
            if (uid && USER_ID_RE.test(uid)) {
                dashboardLink.href = `${API_URL}/dashboard/${encodeURIComponent(uid)}`;
            }
        }
        userIdInput.addEventListener('input', updateDashboardLink);
        updateDashboardLink();

        // ---- テキストエリアの自動リサイズ ----
        function autoResize() {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
        }
        messageInput.addEventListener('input', autoResize);

        // ---- キーボード操作 ----
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ---- ボタンクリック ----
        sendBtn.addEventListener('click', sendMessage);
        welcomeHint.addEventListener('click', () => {
            messageInput.value = '最近の気分を教えてください';
            sendMessage();
        });

        // ---- メッセージ送信 ----
        async function sendMessage() {
            if (isLoading) return;

            const userId  = userIdInput.value.trim();
            const message = messageInput.value.trim();

            // バリデーション
            errorMsg.textContent = '';
            if (!message) {
                errorMsg.textContent = 'メッセージを入力してください';
                return;
            }
            if (!userId || !USER_ID_RE.test(userId)) {
                errorMsg.textContent = 'ユーザーIDは英数字・ハイフン・アンダースコアのみ（1〜64文字）';
                return;
            }

            // ウェルカム画面を隠す
            if (welcome) welcome.style.display = 'none';

            // ユーザーメッセージを表示
            addMessage('user', message);
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // タイピングインジケーター表示
            const typingId = showTyping();
            setLoading(true);

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, message }),
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || `エラーが発生しました (${res.status})`);
                }

                const data = await res.json();
                removeTyping(typingId);
                addMessage('ai', data.reply, data.thought, data.emotion, data.action);
            } catch (e) {
                removeTyping(typingId);
                errorMsg.textContent = e.message.includes('Failed to fetch')
                    ? 'サーバーに接続できません。起動しているか確認してください。'
                    : e.message;
            } finally {
                setLoading(false);
            }
        }

        // ---- ローディング状態管理 ----
        function setLoading(loading) {
            isLoading = loading;
            sendBtn.disabled = loading;
            messageInput.disabled = loading;
        }

        // ---- メッセージをDOMに追加 ----
        function addMessage(role, text, thought, emotion, action) {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;

            const avatarText = role === 'ai' ? 'A' : 'U';
            const avatar = document.createElement('div');
            avatar.className = `avatar ${role}`;
            avatar.textContent = avatarText;

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;
            // 改行だけ <br> に置換（テキストは既にエスケープ済み）
            bubble.innerHTML = bubble.innerHTML.replace(/\n/g, '<br>');

            msg.appendChild(avatar);
            msg.appendChild(bubble);
            chatArea.appendChild(msg);

            // 内面状態タグ（AIのみ）
            if (role === 'ai' && (thought || emotion || action)) {
                const tags = document.createElement('div');
                tags.className = 'inner-state';
                if (thought) appendTag(tags, 'thought', '💭', thought);
                if (emotion) appendTag(tags, 'emotion', '✦', emotion);
                if (action)  appendTag(tags, 'action',  '→', action);
                chatArea.appendChild(tags);
            }

            scrollToBottom();
        }

        function appendTag(parent, cls, icon, text) {
            const span = document.createElement('span');
            span.className = `tag ${cls}`;
            span.textContent = `${icon} ${text}`;
            parent.appendChild(span);
        }

        // ---- タイピングインジケーター ----
        function showTyping() {
            const id = 'typing-' + Date.now();
            const el = document.createElement('div');
            el.className = 'typing';
            el.id = id;

            const avatar = document.createElement('div');
            avatar.className = 'avatar ai';
            avatar.textContent = 'A';

            const dots = document.createElement('div');
            dots.className = 'typing-dots';
            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dots.appendChild(dot);
            }

            el.appendChild(avatar);
            el.appendChild(dots);
            chatArea.appendChild(el);
            scrollToBottom();
            return id;
        }

        function removeTyping(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }
    })();
</script>
</body>
</html>
