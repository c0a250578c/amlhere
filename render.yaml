services:
  - type: web
    name: amlhere
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn sub:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Render ダッシュボードで手動設定
      - key: AMLHERE_CORS_ORIGINS
        value: https://amlhere.onrender.com
      - key: AMLHERE_DB_PATH
        value: /tmp/chappy.db
      - key: PYTHON_VERSION
        value: "3.12"
